<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天吃什麼？附近小吃隨機抽</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 500px; margin: 0 auto; padding: 20px; text-align: center; background-color: #f9f9f9; color: #333; }
        h1 { color: #2c3e50; margin-top: 30px; font-size: 24px; }
        .control-panel { margin: 20px 0; padding: 20px; border: 1px solid #e0e0e0; border-radius: 12px; background-color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .input-group { margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        input[type="number"] { width: 80px; padding: 8px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; text-align: center; }
        button { width: 100%; padding: 12px; font-size: 18px; font-weight: bold; cursor: pointer; color: white; border: none; border-radius: 8px; transition: background 0.2s; }
        #fetchBtn { background-color: #3498db; }
        #fetchBtn:hover { background-color: #2980b9; }
        #rollBtn { background-color: #2ecc71; margin-top: 10px; }
        #rollBtn:hover { background-color: #27ae60; }
        button:disabled { background-color: #bdc3c7 !important; cursor: not-allowed; }
        #result { margin-top: 25px; padding: 20px; border: 2px dashed #2ecc71; border-radius: 12px; background-color: #f2f9f5; display: none; text-align: left; }
        #result h2 { margin-top: 0; color: #27ae60; font-size: 20px; }
        .blacklist-btn { background-color: #e74c3c; font-size: 14px; padding: 8px; margin-top: 15px; }
        .blacklist-btn:hover { background-color: #c0392b; }
        #statusMsg { font-size: 14px; color: #7f8c8d; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>🍔 今天吃什麼？附近小吃隨機抽</h1>

    <div class="control-panel">
        <div class="input-group">
            <label for="radius">搜尋範圍：</label>
            <input type="number" id="radius" value="1000" min="100" max="5000" step="100">
            <span>公尺</span>
        </div>
        <button id="fetchBtn" onclick="getNearbyStores()">1. 讀取附近店家</button>
        <p id="statusMsg">尚未讀取資料</p>
    </div>

    <div>
        <button id="rollBtn" onclick="pickRandomStore()" disabled>2. 今天吃什麼？</button>
    </div>

    <div id="result">
        <h2 id="storeName">店家名稱</h2>
        <p id="storeRating">評價：--</p>
        <p id="storeAddress">地址：--</p>
        <button class="blacklist-btn" onclick="addToBlacklist()">❌ 難吃！永久加入黑名單</button>
    </div>

    <script>
        // ================= [請在下方輸入您的 API KEY] =================
        const API_KEY = 'AIzaSyByJXbYcOjCbcD1yTkvkuE2wVydq7C27Dg'; 
        // =============================================================
        
        let allStores = [];        
        let currentStore = null;   

        function getNearbyStores() {
            const radius = document.getElementById('radius').value;
            const fetchBtn = document.getElementById('fetchBtn');
            const statusMsg = document.getElementById('statusMsg');
            
            if (!navigator.geolocation) {
                alert("瀏覽器不支援取得位置。");
                return;
            }

            fetchBtn.innerText = "正在取得定位...";
            fetchBtn.disabled = true;

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    fetchBtn.innerText = "正在搜尋 Google Map...";
                    
                    try {
                        const response = await fetch('https://places.googleapis.com/v1/places:searchNearby', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-Goog-Api-Key': API_KEY,
                                'X-Goog-FieldMask': 'places.id,places.displayName,places.formattedAddress,places.rating'
                            },
                            body: JSON.stringify({
                                maxResultCount: 20, 
                                includedTypes: ["restaurant", "meal_takeaway"], 
                                locationRestriction: {
                                    circle: {
                                        center: { latitude: lat, longitude: lng },
                                        radius: parseFloat(radius)
                                    }
                                }
                            })
                        });

                        const data = await response.json();
                        
                        if (data.places && data.places.length > 0) {
                            allStores = data.places;
                            document.getElementById('rollBtn').disabled = false;
                            statusMsg.innerText = `成功載入 ${allStores.length} 間鄰近餐廳！`;
                            statusMsg.style.color = '#27ae60';
                        } else {
                            statusMsg.innerText = "範圍內找不到餐廳，請加大搜尋範圍。";
                            statusMsg.style.color = '#e74c3c';
                        }
                    } catch (error) {
                        console.error("API 錯誤:", error);
                        statusMsg.innerText = "讀取失敗，請檢查 API 限制或金鑰設定。";
                        statusMsg.style.color = '#e74c3c';
                    } finally {
                        fetchBtn.innerText = "1. 讀取附近店家";
                        fetchBtn.disabled = false;
                    }
                },
                (error) => {
                    alert("無法取得您的位置，請確認網頁是否有定位權限（必須使用 https 網址或 localhost）。");
                    fetchBtn.innerText = "1. 讀取附近店家";
                    fetchBtn.disabled = false;
                    statusMsg.innerText = "定位授權失敗";
                }
            );
        }

        function pickRandomStore() {
            const blacklist = JSON.parse(localStorage.getItem('food_blacklist')) || [];
            const availableStores = allStores.filter(store => !blacklist.includes(store.id));

            if (availableStores.length === 0) {
                alert("這附近所有店家都被你加進黑名單了啦！😅");
                return;
            }

            const randomIndex = Math.floor(Math.random() * availableStores.length);
            currentStore = availableStores[randomIndex];

            document.getElementById('storeName').innerText = currentStore.displayName.text;
            document.getElementById('storeRating').innerText = `評價：${currentStore.rating ? currentStore.rating + ' ⭐' : '暫無評價'}`;
            document.getElementById('storeAddress').innerText = `地址：${currentStore.formattedAddress}`;
            document.getElementById('result').style.display = 'block';
        }

        function addToBlacklist() {
            if (!currentStore) return;

            let blacklist = JSON.parse(localStorage.getItem('food_blacklist')) || [];
            if (!blacklist.includes(currentStore.id)) {
                blacklist.push(currentStore.id);
                localStorage.setItem('food_blacklist', JSON.stringify(blacklist));
                alert(`已將「${currentStore.displayName.text}」加入黑名單！`);
                
                // 自動重抽一間
                pickRandomStore();
            }
        }
    </script>
</body>
</html>
